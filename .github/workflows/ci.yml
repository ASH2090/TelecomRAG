name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8
      - name: Lint - syntax errors
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Lint - style (non-blocking)
        run: flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  test-parser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt pytest fpdf2 httpx
      - name: Run log parser tests
        run: pytest tests/test_log_parser.py -v
      - name: Run API tests
        run: pytest tests/test_api.py -v

  test-rag:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt pytest fpdf2
      - name: Create test spec PDF
        run: python -m tests.create_test_spec
      - name: Run RAG engine tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: pytest tests/test_rag_engine.py -v