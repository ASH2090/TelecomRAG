name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8
      - name: Lint - syntax errors
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Lint - style (non-blocking)
        run: flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  test-parser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt pytest fpdf2 httpx
      - name: Create test spec PDF for API tests
        run: python -m tests.create_test_spec
      - name: Run log parser tests
        run: pytest tests/test_log_parser.py -v
      - name: Run API tests
        run: pytest tests/test_api.py -v

  test-rag:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt pytest fpdf2
      - name: Create test spec PDF
        run: python -m tests.create_test_spec
      - name: Run RAG engine tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: pytest tests/test_rag_engine.py -v

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint, test-parser]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: telecomrag:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test container starts
        run: |
          docker run -d --name test-container -p 8000:8000 \
            -e GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            telecomrag:test

          echo "Waiting for container to start..."
          for i in {1..30}; do
            if curl -s http://localhost:8000/ > /dev/null; then
              echo "Container is responding"
              break
            fi
            sleep 3
          done

          curl -f http://localhost:8000/ || (docker logs test-container && exit 1)

          docker stop test-container
          docker rm test-container