name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint - catch syntax errors and undefined names
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint - style check (non-blocking)
        run: |
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Test log parser (no API key needed)
        run: |
          python -m app.log_parser

      - name: Test RAG pipeline
        if: env.GROQ_API_KEY != ''
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python -c "
          from app.rag_engine import build_vectordb, query_rag
          import os
          # Only test if specs exist (they won't in CI without data/)
          print('RAG engine imports successfully')
          print('GROQ_API_KEY is set:', bool(os.getenv('GROQ_API_KEY')))
          "

      - name: Test FastAPI app starts
        run: |
          timeout 10 python -c "
          from app.main import app
          print('FastAPI app created successfully')
          print('Routes:', [r.path for r in app.routes])
          " || true